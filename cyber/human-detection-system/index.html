@keyframes scanDown {
  0%   { transform: translateY(0px); opacity: 0.85; }
  85%  { opacity: 0.5; }
  100% { transform: translateY(274px); opacity: 0; }
}
@keyframes blinkDot {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.1; }
}
@keyframes frameCounter {
  from { content: "FRAME 0x0001"; }
  to   { content: "FRAME 0x1FFF"; }
}
@media (prefers-reduced-motion: no-preference) {
  .scan { animation: scanDown 2.6s linear infinite; }
  .blink { animation: blinkDot 0.85s ease-in-out infinite; }
}
</style>
